# Langfuse 本地服务 Docker Compose 配置
# 使用方法:
# 1. 复制 .env.example 为 .env 文件并配置（任意 .env 文件名均可）
# 2. 运行: docker-compose up -d
# 3. 访问: http://localhost:3000
# 4. 默认账号: admin@example.com / admin123456

version: "3.8"

services:
  # Postgres 数据库
  postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langfuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langfuse}
      POSTGRES_DB: ${POSTGRES_DB:-langfuse}
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langfuse} -d ${POSTGRES_DB:-langfuse}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-langfuse}
    volumes:
      - langfuse-redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3 兼容对象存储)
  minio:
    image: minio/minio:latest
    container_name: langfuse-minio
    restart: unless-stopped
    entrypoint: sh
    command: -c "mkdir -p /data/langfuse && minio server --console-address ':9001' /data"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - langfuse-minio-data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ClickHouse (Langfuse V3 必需)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: langfuse-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9002:9000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Langfuse Web 服务
  langfuse-web:
    image: langfuse/langfuse:latest
    container_name: langfuse-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      # 数据库配置
      DATABASE_URL: postgresql://${POSTGRES_USER:-langfuse}:${POSTGRES_PASSWORD:-langfuse}@postgres:5432/${POSTGRES_DB:-langfuse}

      # ClickHouse 配置 (Langfuse V3 必需)
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000/default
      CLICKHOUSE_CLUSTER_ENABLED: "false"

      # Redis 配置
      REDIS_CONNECTION_STRING: redis://default:${REDIS_PASSWORD:-langfuse}@redis:6379/0

      #  salt 用于加密敏感数据
      SALT: ${SALT:-salt123456789012345678901234567890}

      # 加密密钥 (64 位十六进制，通过 openssl rand -hex 32 生成)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-4ed05349fab9c8c937b3d1f3014bfd93050bf7438c34dafb7cd73f48614d4a69}

      # NextAuth 配置
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-nextauth-secret-change-in-production}

      # S3/MinIO 配置
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

      # 可选: 关闭 Cloud 功能
      LANGFUSE_CLOUD_REGION: ""

      # 可选: 启用演示项目
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@example.com}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-admin123456}

      # 可选: 关闭遥测
      TELEMETRY_ENABLED: "${TELEMETRY_ENABLED:-false}"

  # Langfuse Worker (处理 ingestion 队列)
  langfuse-worker:
    image: langfuse/langfuse-worker:latest
    container_name: langfuse-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      langfuse-web:
        condition: service_started
    environment:
      # 数据库配置
      DATABASE_URL: postgresql://${POSTGRES_USER:-langfuse}:${POSTGRES_PASSWORD:-langfuse}@postgres:5432/${POSTGRES_DB:-langfuse}

      # ClickHouse 配置
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000/default
      CLICKHOUSE_CLUSTER_ENABLED: "false"

      # Redis 配置
      REDIS_CONNECTION_STRING: redis://default:${REDIS_PASSWORD:-langfuse}@redis:6379/0

      # salt
      SALT: ${SALT:-salt123456789012345678901234567890}

      # 加密密钥
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-4ed05349fab9c8c937b3d1f3014bfd93050bf7438c34dafb7cd73f48614d4a69}

      # S3/MinIO 配置
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

      # 可选: 关闭遥测
      TELEMETRY_ENABLED: "${TELEMETRY_ENABLED:-false}"

volumes:
  langfuse-postgres-data:
  langfuse-redis-data:
  langfuse-minio-data:
  langfuse-clickhouse-data:
